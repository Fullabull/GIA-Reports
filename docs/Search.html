<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search GIA Repository</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #9a9a9a;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.25rem;
      box-shadow: 0 3px 12px rgba(0,0,0,0.10);
    }

    h1 {
      margin-top: 0;
      font-size: 1.4rem;
      color: #1f1f1f;
    }

    .status {
      margin-bottom: 1rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid #d8d8d8;
      border-radius: 6px;
      background: #ececec;
      font-size: 0.95rem;
    }

    .search-row {
      display: none;
      gap: 0.5rem;
      align-items: center;
    }

    .search-row.ready {
      display: flex;
    }

    #searchForm {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
    }

    .row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .row-main #searchInput {
      flex: 1;
      min-width: 320px;
    }

    .row-options {
      font-size: 0.95rem;
      padding-top: 0.15rem;
    }

    input[type="text"], select {
      padding: 0.7rem 0.8rem;
      font-size: 1rem;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
      color: #222;
    }

    #findButton, #clearButton, #saveSelectionsButton, #resetSelectionsButton {
      padding: 0.7rem 1rem;
      font-size: 1rem;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #e9e9e9;
      cursor: pointer;
    }

    #findButton:hover,
    #clearButton:hover,
    #saveSelectionsButton:hover,
    #resetSelectionsButton:hover {
      background: #dfdfdf;
    }

    #clearButton {
      display: none;
    }

    a {
      color: #2a2a2a;
      text-decoration: none;
    }

    a:hover {
      color: #000;
      text-decoration: underline;
    }

    a:visited {
      color: #2a2a2a;
    }

    a:active {
      color: #000;
    }

    .selection-bar {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid #d8d8d8;
      border-radius: 6px;
      background: #ececec;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .selection-bar.ready {
      display: flex;
    }

    .selection-count {
      font-weight: bold;
      margin-right: 0.5rem;
    }

    .viewerHit {
      background: yellow;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/GIA-Reports/docs/index.html" id="homeLink">&larr; Back to Main</a>
    <br></br>
    <h1>Search Reports from the Office of the Guardian</h1>

    <div id="status" class="status">Loading search archive...</div>

    <div id="searchRow" class="search-row">
      <form id="searchForm">
        <div class="row row-main">
          <input id="searchInput" type="text" placeholder="Enter search text..." autocomplete="off" />

          <button id="findButton" type="submit">Find</button>

          <select id="sortOrder">
            <option value="newest" selected>Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>

          <select id="maxRows">
            <option value="25">25 rows</option>
            <option value="50" selected>50 rows</option>
            <option value="100">100 rows</option>
            <option value="200">200 rows</option>
            <option value="500">500 rows</option>
          </select>
        </div>

        <div class="row row-options">
          <label for="matchType">Match:</label>
          <select id="matchType">
            <option value="substring" selected>Substring</option>
            <option value="word">Whole word</option>
          </select>

          <label for="caseType">Case:</label>
          <select id="caseType">
            <option value="insensitive" selected>Ignore case</option>
            <option value="sensitive">Match case</option>
          </select>

          <button type="button" id="clearButton">Clear</button>
        </div>
      </form>
    </div>

    <div id="selectionBar" class="selection-bar">
      <span id="selectionCount" class="selection-count">Selected: 0</span>
      <label for="includeMetadataCheckbox">
        <input id="includeMetadataCheckbox" type="checkbox" checked />
        Include metadata
      </label>
      <button id="saveSelectionsButton" type="button">Save Selections</button>
      <button id="resetSelectionsButton" type="button">Reset Selections</button>
    </div>

    <div id="results" style="display:none; margin-top:1rem;"></div>

    <div id="viewerOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000;">
      <div style="position:absolute; top:5%; left:5%; width:90%; height:90%; background:#fff; border:1px solid #999; border-radius:8px; display:flex; flex-direction:column;">
        <div id="viewerTitle" style="padding:0.75rem 1rem; border-bottom:1px solid #ddd; font-weight:bold;"></div>
        <div id="viewerSelectBar" style="padding:0.6rem 1rem; border-bottom:1px solid #ddd; text-align:center;">
              <button id="viewerSelectPrevBlockButton" type="button">Select Previous Block</button>
              <button id="viewerSelectButton" type="button">Select This Block</button>
              <button id="viewerSelectNextBlockButton" type="button">Select Next Block</button>
        </div>

        <div id="viewerBody" style="flex:1; overflow:auto; padding:1rem; font-family:Consolas, monospace; white-space:pre-wrap;"></div>

        <div style="padding:0.75rem 1rem; border-top:1px solid #ddd; text-align:center;">
          <button id="viewerPrevButton" type="button">Prev</button>
          <button id="viewerPrevHitButton" type="button">&lt;&lt;</button>
          <button id="viewerCloseButton" type="button">Return to Results</button>
          <button id="viewerNextHitButton" type="button">&gt;&gt;</button>
          <button id="viewerNextButton" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/GIA-Reports/docs/js/jszip.min.js"></script>
  <script>
    (function () {
      const TOOL_VERSION = '2026-03-25.2';
      const ZIP_URL = '/GIA-Reports/docs/search/search.zip';

      const caseTypeEl = document.getElementById('caseType');
      const matchTypeEl = document.getElementById('matchType');
      const maxRowsEl = document.getElementById('maxRows');
      const resultsEl = document.getElementById('results');
      const searchFormEl = document.getElementById('searchForm');
      const searchInputEl = document.getElementById('searchInput');
      const searchRowEl = document.getElementById('searchRow');
      const sortOrderEl = document.getElementById('sortOrder');
      const statusEl = document.getElementById('status');
      const clearButtonEl = document.getElementById('clearButton');

      const selectionBarEl = document.getElementById('selectionBar');
      const selectionCountEl = document.getElementById('selectionCount');
      const includeMetadataCheckboxEl = document.getElementById('includeMetadataCheckbox');
      const saveSelectionsButtonEl = document.getElementById('saveSelectionsButton');
      const resetSelectionsButtonEl = document.getElementById('resetSelectionsButton');

      const viewerOverlayEl = document.getElementById('viewerOverlay');
      const viewerTitleEl = document.getElementById('viewerTitle');
      const viewerBodyEl = document.getElementById('viewerBody');
      const viewerPrevButtonEl = document.getElementById('viewerPrevButton');
      const viewerCloseButtonEl = document.getElementById('viewerCloseButton');
      const viewerNextButtonEl = document.getElementById('viewerNextButton');
      const viewerPrevHitButtonEl = document.getElementById('viewerPrevHitButton');
      const viewerNextHitButtonEl = document.getElementById('viewerNextHitButton');
      const viewerSelectButtonEl = document.getElementById('viewerSelectButton');
      const viewerSelectPrevBlockButtonEl = document.getElementById('viewerSelectPrevBlockButton');
      const viewerSelectNextBlockButtonEl = document.getElementById('viewerSelectNextBlockButton');


      window.GIASearchArchive = {
        loaded: false,
        files: []
      };

      window.GIASearchResults = [];
      window.GIACurrentResultIndex = -1;
      window.GIAHitElements = [];
      window.GIACurrentHitIndex = -1;
      window.GIAHitMatches = [];
      window.GIASelectedResults = [];
      window.GIACurrentOpenFile = null;
      window.lastSearchQuery = '';

      function extractDateFromFilename(filename) {
        const m = filename.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (!m) {
          return '00000000';
        }
        return m[1] + m[2] + m[3]; // YYYYMMDD
      }

      function normalizeTime(ts) {
        if (!ts) {
          return '00:00:00';
        }
        return ts;
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function getSearchRegex(query, matchType, caseType, globalFlag) {
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const pattern = (matchType === 'word') ? ('\\b' + safe + '\\b') : safe;
        let flags = '';
        if (globalFlag) flags += 'g';
        if (caseType === 'insensitive') flags += 'i';
        return new RegExp(pattern, flags);
      }

      function updateSelectionCount() {
        const count = window.GIASelectedResults.length;
        const hasSelections = (count > 0);

        selectionCountEl.textContent = 'Selected: ' + count;

        saveSelectionsButtonEl.disabled = !hasSelections;
        resetSelectionsButtonEl.disabled = !hasSelections;

        if (hasSelections) {
          selectionBarEl.classList.add('ready');
        } else {
          selectionBarEl.classList.remove('ready');
        }
      }

      function getBlockBounds(fullText, hitIndex) {
        const timestampRegex = /^(\d{2}:\d{2}:\d{2})$/gm;
        const starts = [];
        let match;

        while ((match = timestampRegex.exec(fullText)) !== null) {
          starts.push(match.index);

          if (match[0].length === 0) {
            timestampRegex.lastIndex++;
          }
        }

        if (starts.length === 0) {
          return {
            start: 0,
            end: fullText.length
          };
        }

        let blockStart = starts[0];
        let blockEnd = fullText.length;

        for (let i = 0; i < starts.length; i++) {
          const start = starts[i];
          const nextStart = (i + 1 < starts.length) ? starts[i + 1] : fullText.length;

          if (hitIndex >= start && hitIndex < nextStart) {
            blockStart = start;
            blockEnd = nextStart;
            break;
          }
        }

        while (blockEnd > blockStart && /\s/.test(fullText.charAt(blockEnd - 1))) {
          blockEnd--;
        }

        return {
          start: blockStart,
          end: blockEnd
        };
      }

      function extractTimestamp(blockText, fullText, hitIndex) {
        let m = blockText.match(/^\s*(\d{2}:\d{2}:\d{2})/m);
        if (m) {
          return m[1];
        }

        const before = fullText.substring(0, hitIndex);
        const matches = before.match(/(\d{2}:\d{2}:\d{2})/g);

        if (matches && matches.length > 0) {
          return matches[matches.length - 1];
        }

        return 'UNKNOWN';
      }

      function getCurrentSelectedBlock() {
        if (!window.GIACurrentOpenFile) {
          return null;
        }

        if (window.GIACurrentHitIndex < 0 || window.GIACurrentHitIndex >= window.GIAHitMatches.length) {
          return null;
        }

        const file = window.GIACurrentOpenFile;
        const hit = window.GIAHitMatches[window.GIACurrentHitIndex];
        const bounds = getBlockBounds(file.text, hit.index);
        const blockText = file.text.substring(bounds.start, bounds.end).trim();
        const filename = file.name.split('/').pop();
        const timestamp = extractTimestamp(blockText, file.text, hit.index);

        return {
          query: window.lastSearchQuery || '',
          filename: filename,
          filePath: file.name,
          reportUrl: file.url,
          timestamp: timestamp,
          hitNumberInFile: window.GIACurrentHitIndex + 1,
          hitCountInFile: window.GIAHitMatches.length,
          blockText: blockText,
          blockStart: bounds.start
        };
      }

      function getAdjacentBlock(offset) {
        if (!window.GIACurrentOpenFile) {
          return null;
        }

        if (window.GIACurrentHitIndex < 0 || window.GIACurrentHitIndex >= window.GIAHitMatches.length) {
          return null;
        }

        if (offset !== -1 && offset !== 1) {
          return null;
        }

        const file = window.GIACurrentOpenFile;
        const hit = window.GIAHitMatches[window.GIACurrentHitIndex];
        const fullText = file.text;
        const timestampRegex = /^(\d{2}:\d{2}:\d{2})$/gm;
        const starts = [];
        let match;

        while ((match = timestampRegex.exec(fullText)) !== null) {
          starts.push(match.index);

          if (match[0].length === 0) {
            timestampRegex.lastIndex++;
          }
        }

        if (starts.length === 0) {
          return null;
        }

        let currentBlockIndex = -1;

        for (let i = 0; i < starts.length; i++) {
          const start = starts[i];
          const nextStart = (i + 1 < starts.length) ? starts[i + 1] : fullText.length;

          if (hit.index >= start && hit.index < nextStart) {
            currentBlockIndex = i;
            break;
          }
        }

        if (currentBlockIndex === -1) {
          return null;
        }

        const targetBlockIndex = currentBlockIndex + offset;

        if (targetBlockIndex < 0 || targetBlockIndex >= starts.length) {
          return null;
        }

        const start = starts[targetBlockIndex];
        let end = (targetBlockIndex + 1 < starts.length) ? starts[targetBlockIndex + 1] : fullText.length;

        while (end > start && /\s/.test(fullText.charAt(end - 1))) {
          end--;
        }

        const blockText = fullText.substring(start, end).trim();

        if (!blockText) {
          return null;
        }

        const filename = file.name.split('/').pop();

        return {
          query: window.lastSearchQuery || '',
          filename: filename,
          filePath: file.name,
          reportUrl: file.url,
          timestamp: extractTimestamp(getCurrentSelectedBlock().blockText, fullText, hit.index),
          hitNumberInFile: window.GIACurrentHitIndex + 1,
          hitCountInFile: window.GIAHitMatches.length,
          blockText: blockText,
          blockStart: start
        };
      }

      function isCurrentBlockSelected() {
        const selected = getCurrentSelectedBlock();

        if (!selected) {
          return false;
        }

        return isDuplicateSelection(selected);
      }

      function updateSelectButtonState() {
        if (window.GIAHitMatches.length === 0) {
          viewerSelectButtonEl.disabled = true;
          viewerSelectButtonEl.textContent = 'Select This Block';
          return;
        }

        if (isCurrentBlockSelected()) {
          viewerSelectButtonEl.disabled = true;
          viewerSelectButtonEl.textContent = 'Already Selected';
        } else {
          viewerSelectButtonEl.disabled = false;
          viewerSelectButtonEl.textContent = 'Select This Block';
        }
      }

      function isDuplicateSelection(newItem) {
        for (let i = 0; i < window.GIASelectedResults.length; i++) {
          const item = window.GIASelectedResults[i];
          if (item.filename === newItem.filename && item.blockStart === newItem.blockStart) {
            return true;
          }
        }
        return false;
      }

      function flashAddedMessage() {
        const baseTitle = viewerTitleEl.textContent.split('   ')[0];
        viewerTitleEl.textContent = baseTitle + '   Added (' + window.GIASelectedResults.length + ')';

        setTimeout(function () {
          updateCurrentHit();
        }, 900);
      }

      function selectCurrentBlock() {
        const selected = getCurrentSelectedBlock();

        if (!selected) {
          return;
        }

        if (isDuplicateSelection(selected)) {
          return;
        }

        window.GIASelectedResults.push(selected);
        updateSelectionCount();
        flashAddedMessage();
        updateSelectButtonState();
      }

      function selectAdjacentBlock(offset) {
        const selected = getAdjacentBlock(offset);

        if (!selected) {
          return;
        }

        if (isDuplicateSelection(selected)) {
          return;
        }

        window.GIASelectedResults.push(selected);
        updateSelectionCount();
      }

      function downloadTextFile(filename, text) {
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 1000);
      }

      function saveSelections() {
        if (window.GIASelectedResults.length === 0) {
          return;
        }

        const nowObj = new Date();
        const nowIso = nowObj.toISOString().replace(/\.\d{3}Z$/, 'Z');

        function pad2(n) {
          return String(n).padStart(2, '0');
        }

        const nowStamp =
          nowObj.getUTCFullYear().toString() +
          pad2(nowObj.getUTCMonth() + 1) +
          pad2(nowObj.getUTCDate()) +
          '.' +
          pad2(nowObj.getUTCHours()) +
          pad2(nowObj.getUTCMinutes()) +
          pad2(nowObj.getUTCSeconds());

        const lines = [];
        const includeMetadata = includeMetadataCheckboxEl.checked;

        if (includeMetadata) {
        lines.push('Generated: ' + nowIso);
        lines.push('Search query: ' + (window.lastSearchQuery || ''));
        lines.push('Match/Case: ' + matchTypeEl.value + '/' + caseTypeEl.value);
        lines.push('Files searched: ' + window.GIASearchArchive.files.length);
        lines.push('Tool version: ' + TOOL_VERSION);
        /* lines.push('Max rows: ' + maxRowsEl.value); */
        /* lines.push('Total selections: ' + window.GIASelectedResults.length); */
        lines.push('');
        }

        const sortedSelections = window.GIASelectedResults.slice().sort(function (a, b) {
          const fileCompare = a.filename.localeCompare(b.filename);
          if (fileCompare !== 0) {
            return fileCompare;
          }

          return a.blockStart - b.blockStart;
        });

        for (let i = 0; i < sortedSelections.length; i++) {
          const item = sortedSelections[i];

          lines.push('============================================================');
          lines.push('File: ' + item.filename);
          lines.push(item.blockText);
          lines.push('');
        }

        const safeQuery = (window.lastSearchQuery || 'search')
          .replace(/[^A-Za-z0-9_-]+/g, '_')
          .replace(/^_+|_+$/g, '');

        const outName = 'GIA_Insight_' + (safeQuery || 'search') + '_' + nowStamp + '.txt';
        downloadTextFile(outName, lines.join('\n'));
      }

      function resetSelections() {
        window.GIASelectedResults = [];
        updateSelectionCount();
        updateSelectButtonState();
      }

      function updateCurrentHit() {
        for (let i = 0; i < window.GIAHitElements.length; i++) {
          window.GIAHitElements[i].style.background =
            (i === window.GIACurrentHitIndex) ? 'orange' : 'yellow';
        }

        if (window.GIACurrentHitIndex >= 0 && window.GIAHitElements[window.GIACurrentHitIndex]) {
          window.GIAHitElements[window.GIACurrentHitIndex].scrollIntoView({ block: 'center' });
        }

        viewerPrevHitButtonEl.disabled = (window.GIACurrentHitIndex <= 0);
        viewerNextHitButtonEl.disabled = (window.GIACurrentHitIndex >= window.GIAHitElements.length - 1);

        const filename = viewerTitleEl.textContent.split('   ')[0];

        if (window.GIAHitElements.length > 0) {
          viewerTitleEl.textContent =
            filename + '   (Hit ' +
            (window.GIACurrentHitIndex + 1) +
            ' of ' +
            window.GIAHitElements.length +
            ')';
        } else {
          viewerTitleEl.textContent = filename;
        }
        updateSelectButtonState();
      }

      function openViewer(file, query) {
        const filename = file.name.split('/').pop();
        const matchType = matchTypeEl.value;
        const caseType = caseTypeEl.value;

        window.GIACurrentOpenFile = file;
        viewerTitleEl.textContent = filename + '   ';

        const regex = getSearchRegex(query, matchType, caseType, true);

        let html = '';
        let lastIndex = 0;
        let match;
        let hitCount = 0;

        window.GIAHitMatches = [];

        while ((match = regex.exec(file.text)) !== null) {
          window.GIAHitMatches.push({
            index: match.index,
            text: match[0]
          });

          html += escapeHtml(file.text.substring(lastIndex, match.index));
          html += '<span class="viewerHit">' + escapeHtml(match[0]) + '</span>';
          lastIndex = match.index + match[0].length;
          hitCount++;

          if (match[0].length === 0) {
            regex.lastIndex++;
          }
        }

        html += escapeHtml(file.text.substring(lastIndex));

        if (hitCount > 0) {
          viewerBodyEl.innerHTML = html;
          window.GIAHitElements = Array.from(viewerBodyEl.querySelectorAll('.viewerHit'));
          window.GIACurrentHitIndex = 0;
        } else {
          viewerBodyEl.textContent = file.text;
          window.GIAHitElements = [];
          window.GIAHitMatches = [];
          window.GIACurrentHitIndex = -1;
        }

        viewerOverlayEl.style.display = 'block';

        if (window.GIAHitElements.length > 0) {
          updateCurrentHit();
        } else {
          viewerBodyEl.scrollTop = 0;
          viewerPrevHitButtonEl.disabled = true;
          viewerNextHitButtonEl.disabled = true;
        }

        updateSelectButtonState();
        viewerPrevButtonEl.disabled = (window.GIACurrentResultIndex <= 0);
        viewerNextButtonEl.disabled = (window.GIACurrentResultIndex >= window.GIASearchResults.length - 1);
      }

      function runSearch(query) {
        const matchType = matchTypeEl.value;
        const caseType = caseTypeEl.value;
        const maxRows = parseInt(maxRowsEl.value, 10);
        const fileMatchRegex = getSearchRegex(query, matchType, caseType, false);
        const countRegex = getSearchRegex(query, matchType, caseType, true);

        let totalMatches = 0;
        let matches = [];

        for (const file of window.GIASearchArchive.files) {
          if (fileMatchRegex.test(file.text)) {
            matches.push(file);
            totalMatches++;
          }
        }

        resultsEl.style.display = 'block';

        if (matches.length === 0) {
          resultsEl.textContent = 'No matches found.';
          window.GIASearchResults = [];
          clearButtonEl.style.display = 'none';
          selectionBarEl.classList.remove('ready');
          return;
        }

        const sortOrder = sortOrderEl.value;

        matches.sort(function(a, b) {
          const aName = a.name.split('/').pop();
          const bName = b.name.split('/').pop();

          if (sortOrder === 'oldest') {
            if (a.year !== b.year) return a.year - b.year;
            return aName.localeCompare(bName);
          } else {
            if (a.year !== b.year) return b.year - a.year;
            return bName.localeCompare(aName);
          }
        });

        matches = matches.slice(0, maxRows);
        window.GIASearchResults = matches;

        let html = '<div>Found in ' + totalMatches + ' file(s)';

        if (totalMatches > matches.length) {
          html += ' (showing first ' + matches.length + ')';
        }

        html += ':</div>';
        html += '<table style="margin-top:0.5rem;border-collapse:collapse;">';
        html += '<tr><th style="text-align:center;padding-right:1rem;">Matches</th><th style="text-align:left;">Filename</th></tr>';

        for (let i = 0; i < matches.length; i++) {
          const file = matches[i];
          const filename = file.name.split('/').pop();
          const hits = file.text.match(countRegex);
          const count = hits ? hits.length : 0;

          html += '<tr>';
          html += '<td style="text-align:center;padding-right:1rem;">' + count + '</td>';
          html += '<td><a href="#" class="resultLink" data-result-index="' + i + '">' + filename + '</a></td>';
          html += '</tr>';
        }

        html += '</table>';
        resultsEl.innerHTML = html;

        const resultLinks = resultsEl.querySelectorAll('.resultLink');

        for (const link of resultLinks) {
          link.addEventListener('click', function (e) {
            e.preventDefault();

            const resultIndex = parseInt(this.getAttribute('data-result-index'), 10);
            const file = window.GIASearchResults[resultIndex];

            window.GIACurrentResultIndex = resultIndex;
            openViewer(file, query);
          });
        }

        clearButtonEl.style.display = 'inline-block';

      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && viewerOverlayEl.style.display !== 'none') {
          viewerOverlayEl.style.display = 'none';
        }
      });

      viewerCloseButtonEl.addEventListener('click', function () {
        viewerOverlayEl.style.display = 'none';
      });

      viewerOverlayEl.addEventListener('click', function (e) {
        if (e.target === viewerOverlayEl) {
          viewerOverlayEl.style.display = 'none';
        }
      });

      viewerPrevButtonEl.addEventListener('click', function () {
        if (window.GIACurrentResultIndex <= 0) {
          return;
        }

        window.GIACurrentResultIndex--;
        const file = window.GIASearchResults[window.GIACurrentResultIndex];
        openViewer(file, window.lastSearchQuery);
      });

      viewerNextButtonEl.addEventListener('click', function () {
        if (window.GIACurrentResultIndex >= window.GIASearchResults.length - 1) {
          return;
        }

        window.GIACurrentResultIndex++;
        const file = window.GIASearchResults[window.GIACurrentResultIndex];
        openViewer(file, window.lastSearchQuery);
      });

      viewerPrevHitButtonEl.addEventListener('click', function () {
        if (window.GIACurrentHitIndex <= 0) {
          return;
        }

        window.GIACurrentHitIndex--;
        updateCurrentHit();
      });

      viewerNextHitButtonEl.addEventListener('click', function () {
        if (window.GIACurrentHitIndex >= window.GIAHitElements.length - 1) {
          return;
        }

        window.GIACurrentHitIndex++;
        updateCurrentHit();
      });

      viewerSelectButtonEl.addEventListener('click', function () {
        selectCurrentBlock();
      });

      saveSelectionsButtonEl.addEventListener('click', function () {
        saveSelections();
      });

      resetSelectionsButtonEl.addEventListener('click', function () {
        resetSelections();
      });

      viewerSelectPrevBlockButtonEl.addEventListener('click', function () {
        selectAdjacentBlock(-1);
      });

      viewerSelectNextBlockButtonEl.addEventListener('click', function () {
        selectAdjacentBlock(1);
      });

      searchFormEl.addEventListener('submit', function(e) {
        e.preventDefault();

        const query = searchInputEl.value.trim();
        if (!query) {
          resultsEl.style.display = 'none';
          resultsEl.textContent = '';
          return;
        }

        window.lastSearchQuery = query;
        runSearch(query);
      });

      sortOrderEl.addEventListener('change', function () {
        if (window.lastSearchQuery) {
          runSearch(window.lastSearchQuery);
        }
      });

      maxRowsEl.addEventListener('change', function () {
        if (window.lastSearchQuery) {
          runSearch(window.lastSearchQuery);
        }
      });

      matchTypeEl.addEventListener('change', function () {
        if (window.lastSearchQuery) {
          runSearch(window.lastSearchQuery);
        }
      });

      caseTypeEl.addEventListener('change', function () {
        if (window.lastSearchQuery) {
          runSearch(window.lastSearchQuery);
        }
      });

      async function loadSearchArchive() {
        try {
          statusEl.textContent = 'Fetching search.zip...';

          const response = await fetch(ZIP_URL, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('HTTP ' + response.status + ' while fetching ' + ZIP_URL);
          }

          statusEl.textContent = 'Reading zip into memory...';
          const zipBuffer = await response.arrayBuffer();

          statusEl.textContent = 'Inflating archive...';
          const zip = await JSZip.loadAsync(zipBuffer);

          const files = [];
          const entries = Object.keys(zip.files);

          for (const name of entries) {
            const entry = zip.files[name];
            if (entry.dir) {
              continue;
            }

            const rawText = await entry.async('string');
            const text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const year = parseInt(name.match(/\d{4}/)[0], 10);

            const htmlName = name
              .replace('_WSR.txt', '_GIA_Report.html')
              .replace('.txt', '_GIA_Report.html');

            const url = '/GIA-Reports/docs/' + htmlName;

            files.push({
              name: name,
              url: url,
              text: text,
              year: year
            });
          }

          window.GIASearchArchive.loaded = true;
          window.GIASearchArchive.files = files;

          statusEl.textContent = 'Archive loaded: ' + files.length + ' file(s) ready.';
          searchRowEl.classList.add('ready');
          updateSelectionCount();
          searchInputEl.focus();
        } catch (err) {
          console.error(err);
          statusEl.textContent = 'Failed to load search archive: ' + err.message;
        }
      }

      clearButtonEl.addEventListener('click', function () {
        searchInputEl.value = '';
        resultsEl.style.display = 'none';
        resultsEl.innerHTML = '';
        this.style.display = 'none';
        selectionBarEl.classList.remove('ready');
        searchInputEl.focus();
      });

      loadSearchArchive();
    })();
  </script>
</body>
</html>
