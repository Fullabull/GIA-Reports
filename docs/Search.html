<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search GIA Repository</title>
<style>

  :root {
    --search-page-bg: #08141C;
    --search-surface-bg: #1C272E;
    --search-block-bg: #2B353C;
    --search-block-hover-bg: #394349;
    --search-block-selected-bg: #525B60;
    --search-block-anchor-bg: #666D72;
    --search-button-bg: #212C33;
    --search-button-hover-bg: #343E45;
    --search-border-color: #525B60;
    --search-text: #F4F4F4;
    --search-text-muted: #C8D0D4;
    --search-selected-text: #F4F4F4;
    --search-anchor-text: #F4F4F4;
    --search-disabled-bg: #121D25;
    --search-disabled-text: #C8D0D4;
    --search-feedback-color: #575F65;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 2rem;
    background: var(--search-page-bg);
    color: var(--search-text);
  }

  .search-wrap,
  .search-panel,
  .search-dialog,
  .search-results-dialog,
  .search-controls,
  .search-toolbar {
    background: var(--search-surface-bg);
    color: var(--search-text);
  }

  input,
  select,
  textarea {
    background: var(--search-block-bg);
    color: var(--search-text);
    border: 1px solid var(--search-border-color);
  }

  input::placeholder,
  textarea::placeholder {
    color: var(--search-text-muted);
  }

  input[type="text"],
  input[type="number"] {
    padding: 0.7rem 0.8rem;
    font-size: 1rem;
    border-radius: 4px;
  }

  select {
    padding: 0.7rem 0.8rem;
    font-size: 1rem;
    border-radius: 2px;
    box-shadow: none;
  }

  select:hover {
    border-color: rgba(124,196,255,0.4);
  }

  select:focus {
    outline: none;
    border-color: rgba(124,196,255,0.6);
  }

  button {
    background: var(--search-button-bg);
    color: var(--search-text);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 1px 2px rgba(0,0,0,0.28);
    transition: background 0.15s ease, transform 0.05s ease, box-shadow 0.05s ease;
  }

  button:hover:not(:disabled) {
    background: var(--search-button-hover-bg);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 1px 3px rgba(0,0,0,0.34);
  }

  button:disabled {
    background: var(--search-disabled-bg);
    color: var(--search-disabled-text);
    border-color: var(--search-border-color);
    cursor: not-allowed;
    opacity: 1;
    box-shadow: none;
  }

  button:active:not(:disabled) {
    transform: translateY(1px);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.35);
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    background: var(--search-surface-bg);
    border: 1px solid var(--search-border-color);
    border-radius: 8px;
    padding: 1.25rem;
    box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  }

  h1 {
    margin-top: 0;
    font-size: 1.4rem;
    color: var(--search-text);
  }

  .status {
    margin-bottom: 1rem;
    padding: 0.75rem 0.9rem;
    border: 1px solid var(--search-border-color);
    border-radius: 6px;
    background: var(--search-block-bg);
    color: var(--search-text-muted);
    font-size: 0.95rem;
  }

  .search-row {
    display: none;
    gap: 0.5rem;
    align-items: center;
  }

  .search-row.ready {
    display: flex;
  }

  #searchForm {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    width: 100%;
  }

  .row {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .row-main #searchInput {
    flex: 1 1 320px; /* prefers 320px but shrinks if necessary */
    min-width: 0;
  }

  .row-options {
    font-size: 0.95rem;
    padding-top: 0.15rem;
  }

  #findButton,
  #clearButton,
  #saveSelectionsButton,
  #resetSelectionsButton,
  #btnAdvancedToggle {
    padding: 0.7rem 1rem;
    font-size: 1rem;
    border: 1px solid var(--search-border-color);
    border-radius: 8px;
    background: var(--search-button-bg);
    color: var(--search-text);
    cursor: pointer;
  }

  #findButton:hover,
  #clearButton:hover,
  #saveSelectionsButton:hover,
  #resetSelectionsButton:hover,
  #btnAdvancedToggle:hover {
    background: var(--search-button-hover-bg);
  }

  #clearButton {
    display: none;
  }

  a {
    color: var(--search-text);
    text-decoration: none;
  }

  a:hover {
    color: var(--search-text);
    text-decoration: underline;
  }

  a:visited {
    color: var(--search-text-muted);
  }

  a:active {
    color: var(--search-text);
  }

  .selection-bar {
    display: none;
    margin-top: 1rem;
    padding: 0.75rem 0.9rem;
    border: 1px solid var(--search-border-color);
    border-radius: 6px;
    background: var(--search-block-bg);
    color: var(--search-text);
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .selection-bar.ready {
    display: flex;
  }

  .selection-count {
    font-weight: bold;
    margin-right: 0.5rem;
  }

  .viewerHit {
    background: #4A565E;
    color: var(--search-text);
  }

  #advancedPanel {
    background: var(--search-block-bg);
    border: 1px solid var(--search-border-color);
    border-radius: 6px;
    box-shadow:
    0 10px 28px rgba(0,0,0,0.45),
    0 0 0 1px rgba(124,196,255,0.10);;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }

  #advancedPanel .adv-row button,
  #advancedPanel .adv-row input.term-input {
    margin-right: 4px;
  }

  #advancedPanel .not-toggle {
    min-width: 72px;
    text-align: left;
    font-family: Consolas, monospace;
  }

  #advancedPanel .not-toggle.active {
    background: var(--search-block-selected-bg);
    color: var(--search-selected-text);
  }

  #advancedPanel .op-btn.active {
    background: var(--search-block-anchor-bg);
    color: var(--search-anchor-text);
  }

  #advancedPanel .advanced-actions {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1rem;
    padding-bottom: 0.75rem; /* 👈 breathing room below */
  }

  #advancedPanel .advanced-actions button {
    font-size: 1.05rem;
    padding: 0.8rem 1.3rem;   /* 👈 bigger click targets */
    border-radius: 10px;      /* slightly rounder than normal buttons */
    min-width: 110px;         /* keeps them consistent */
  }


  #advancedPanel.advanced-panel-hidden {
    display: none;
    opacity: 0;
    transform: translateY(-6px);
  }

  #advancedPanel.advanced-panel-enter {
    display: block;
    opacity: 0;
    transform: translateY(-6px);
  }

  #advancedPanel.advanced-panel-open {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

    button:disabled {
      pointer-events: none;
      opacity: 0.75;
    }

</style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
      <a href="/GIA-Reports/docs/index.html" id="homeLink">&larr; Back to Main</a>
      <button id="themeToggleButton" type="button">Theme</button>
    </div>

    <h1>Search Reports from the Office of the Guardian</h1>

    <div id="status" class="status">Loading search archive...</div>

    <div id="advancedPanel" class="advanced-panel-hidden" style="padding:12px; margin-top:10px;">

      <!-- TOP CONTROL ROW -->
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">

        <!-- LEFT SIDE -->
        <div style="display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap;">

          <label>
            Match:
            <select id="advancedMatchType">
              <option value="substring" selected>Substring</option>
              <option value="word">Whole word</option>
            </select>
          </label>

          <label>
            <input type="checkbox" id="caseSensitiveCheckbox"> Case Sensitive
          </label>

        </div>

        <!-- RIGHT SIDE -->
        <div style="display:flex; align-items:center; gap:0.6rem;">

          <label>
            Sort:
            <select id="advancedSortOrder">
              <option value="newest" selected>Newest first</option>
              <option value="oldest">Oldest first</option>
            </select>
          </label>

          <label>
            Max:
            <select id="advancedMaxRows">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="200">200</option>
              <option value="500">500</option>
            </select>
          </label>

        </div>

      </div>

      <!-- ADVANCED ROWS -->
      <div id="advancedRows" style="margin-top:10px;"></div>

      <!-- ACTION BUTTONS -->
      <div class="advanced-actions">
        <button id="btnAdvancedSearch">Search</button>
        <button id="btnAdvancedClear">Clear</button>
        <button id="btnAdvancedClose">Close</button>
      </div>

    </div>

    <div id="searchRow" class="search-row">
      <form id="searchForm">
        <div class="row row-main">
          <input id="searchInput" type="text" placeholder="Enter search text..." autocomplete="off" />

          <button id="findButton" type="submit">Find</button>

          <select id="sortOrder">
            <option value="newest" selected>Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>

          <select id="maxRows">
            <option value="25">25 rows</option>
            <option value="50" selected>50 rows</option>
            <option value="100">100 rows</option>
            <option value="200">200 rows</option>
            <option value="500">500 rows</option>
          </select>
        </div>

        <div class="row row-options">
          <label for="matchType">Match:</label>
          <select id="matchType">
            <option value="substring" selected>Substring</option>
            <option value="word">Whole word</option>
          </select>

          <label for="caseType">Case:</label>
          <select id="caseType">
            <option value="insensitive" selected>Ignore case</option>
            <option value="sensitive">Match case</option>
          </select>

          <!--
          <button type="button" id="btnAdvancedToggle">Advanced</button>
          -->
          <button id="btnAdvancedToggle" type="button" hidden aria-hidden="true" tabindex="-1" >Advanced</button>
          <button type="button" id="clearButton">Clear</button>
        </div>

      </form>
    </div>

    <div id="selectionBar" class="selection-bar">
      <span id="selectionCount" class="selection-count">Selected: 0</span>
      <label for="includeMetadataCheckbox">
        <input id="includeMetadataCheckbox" type="checkbox" checked />
        Include metadata
      </label>
      <button id="saveSelectionsButton" type="button">Save Selections</button>
      <button id="resetSelectionsButton" type="button">Reset Selections</button>
    </div>

    <div id="results" style="display:none; margin-top:1rem;"></div>

    <div id="viewerOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000;">
      <div style="position:absolute; top:5%; left:5%; width:90%; height:90%; background:var(--search-surface-bg);color:var(--search-text); border:1px solid #999; border-radius:8px; display:flex; flex-direction:column;">

        <div style="padding:0.75rem 1rem; border-bottom:1px solid #ddd; display:flex; align-items:center;">

          <!-- LEFT -->
          <div id="viewerTitle" style="font-weight:bold; flex:1;"></div>

          <!-- CENTER -->
          <div style="display:flex; gap:0.75rem; justify-content:center;">
            <button id="viewerPrevButton" type="button">Prev File</button>
            <button id="viewerNextButton" type="button">Next File</button>
          </div>

          <!-- RIGHT -->
          <div style="flex:1; display:flex; justify-content:flex-end;">
            <button id="viewerThemeToggleButton" type="button">Theme</button>
          </div>

        </div>

        <div id="viewerBody" style="flex:1; overflow:auto; padding:1rem; font-family:Consolas, monospace; white-space:pre-wrap;"></div>

        <div id="viewerSelectBar" style="padding:0.3rem 1rem 0.2rem 1rem; border-top:1px solid var(--search-border-color); text-align:center;">
          <span style="margin-right:0.5rem; color:var(--search-text-muted);">Select for Export:</span>
          <button id="viewerSelectPrevBlockButton" type="button">Previous</button>
          <button id="viewerSelectButton" type="button">Select This Block</button>
          <button id="viewerSelectNextBlockButton" type="button">Next</button>
        </div>

        <div style="padding:0.2rem 1rem 0.4rem 1rem; border-top:1px solid var(--search-border-color); text-align:center;">
          <span style="margin-right:0.5rem; color:var(--search-text-muted);">Navigate:</span>
          <button id="viewerPrevHitButton" type="button">&lt;&lt;</button>
          <button id="viewerCloseButton" type="button">Return to Results</button>
          <button id="viewerNextHitButton" type="button">&gt;&gt;</button>
        </div>
      </div>
    </div>
  </div>

      function applySearchTheme(theme) {
        const root = document.documentElement;

        root.style.setProperty('--search-page-bg', theme.pageBg);
        root.style.setProperty('--search-surface-bg', theme.surfaceBg);
        root.style.setProperty('--search-block-bg', theme.blockBg);
        root.style.setProperty('--search-block-hover-bg', theme.blockHoverBg);
        root.style.setProperty('--search-block-selected-bg', theme.blockSelectedBg);
        root.style.setProperty('--search-block-anchor-bg', theme.blockAnchorBg);
        root.style.setProperty('--search-button-bg', theme.buttonBg);
        root.style.setProperty('--search-button-hover-bg', theme.buttonHoverBg);
        root.style.setProperty('--search-border-color', theme.borderColor);
        root.style.setProperty('--search-text', theme.textColor);
        root.style.setProperty('--search-text-muted', theme.mutedTextColor);
        root.style.setProperty('--search-selected-text', theme.selectedTextColor);
        root.style.setProperty('--search-anchor-text', theme.anchorTextColor);
        root.style.setProperty('--search-disabled-bg', theme.disabledBg);
        root.style.setProperty('--search-disabled-text', theme.disabledTextColor);
        root.style.setProperty('--search-feedback-color', theme.feedbackColor);
      }

      function extractDateFromFilename(filename) {
        const m = filename.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (!m) {
          return '00000000';
        }
        return m[1] + m[2] + m[3]; // YYYYMMDD
      }

      function normalizeTime(ts) {
        if (!ts) {
          return '00:00:00';
        }
        return ts;
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function escapeRegex(s) {
        return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function getSearchRegex(query, matchType, caseType, globalFlag) {
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const pattern = (matchType === 'word') ? ('\\b' + safe + '\\b') : safe;
        let flags = '';
        if (globalFlag) flags += 'g';
        if (caseType === 'insensitive') flags += 'i';
        return new RegExp(pattern, flags);
      }

      function updateSelectionCount() {
        const count = window.GIASelectedResults.length;
        const hasSelections = (count > 0);

        selectionCountEl.textContent = 'Selected: ' + count;

        saveSelectionsButtonEl.disabled = !hasSelections;
        resetSelectionsButtonEl.disabled = !hasSelections;

        if (hasSelections) {
          selectionBarEl.classList.add('ready');
        } else {
          selectionBarEl.classList.remove('ready');
        }
      }

      function getBlockBounds(fullText, hitIndex) {
        const timestampRegex = /^(\d{2}:\d{2}:\d{2})$/gm;
        const starts = [];
        let match;

        while ((match = timestampRegex.exec(fullText)) !== null) {
          starts.push(match.index);

          if (match[0].length === 0) {
            timestampRegex.lastIndex++;
          }
        }

        if (starts.length === 0) {
          return {
            start: 0,
            end: fullText.length
          };
        }

        let blockStart = starts[0];
        let blockEnd = fullText.length;

        for (let i = 0; i < starts.length; i++) {
          const start = starts[i];
          const nextStart = (i + 1 < starts.length) ? starts[i + 1] : fullText.length;

          if (hitIndex >= start && hitIndex < nextStart) {
            blockStart = start;
            blockEnd = nextStart;
            break;
          }
        }

        while (blockEnd > blockStart && /\s/.test(fullText.charAt(blockEnd - 1))) {
          blockEnd--;
        }

        return {
          start: blockStart,
          end: blockEnd
        };
      }

      function extractTimestamp(blockText, fullText, hitIndex) {
        let m = blockText.match(/^\s*(\d{2}:\d{2}:\d{2})/m);
        if (m) {
          return m[1];
        }

        const before = fullText.substring(0, hitIndex);
        const matches = before.match(/(\d{2}:\d{2}:\d{2})/g);

        if (matches && matches.length > 0) {
          return matches[matches.length - 1];
        }

        return 'UNKNOWN';
      }

      function getCurrentSelectedBlock() {
        if (!window.GIACurrentOpenFile) {
          return null;
        }

        if (window.GIACurrentHitIndex < 0 || window.GIACurrentHitIndex >= window.GIAHitMatches.length) {
          return null;
        }

        const file = window.GIACurrentOpenFile;
        const hit = window.GIAHitMatches[window.GIACurrentHitIndex];
        const bounds = getBlockBounds(file.text, hit.index);
        const blockText = file.text.substring(bounds.start, bounds.end).trim();
        const filename = file.name.split('/').pop();
        const timestamp = extractTimestamp(blockText, file.text, hit.index);

        return {
          query: window.lastSearchQuery || '',
          filename: filename,
          filePath: file.name,
          reportUrl: file.url,
          timestamp: timestamp,
          hitNumberInFile: window.GIACurrentHitIndex + 1,
          hitCountInFile: window.GIAHitMatches.length,
          blockText: blockText,
          blockStart: bounds.start
        };
      }

      function getAdjacentBlock(offset) {
        if (!window.GIACurrentOpenFile) {
          return null;
        }

        if (window.GIACurrentHitIndex < 0 || window.GIACurrentHitIndex >= window.GIAHitMatches.length) {
          return null;
        }

        if (offset !== -1 && offset !== 1) {
          return null;
        }

        const file = window.GIACurrentOpenFile;
        const hit = window.GIAHitMatches[window.GIACurrentHitIndex];
        const fullText = file.text;
        const timestampRegex = /^(\d{2}:\d{2}:\d{2})$/gm;
        const starts = [];
        let match;

        while ((match = timestampRegex.exec(fullText)) !== null) {
          starts.push(match.index);

          if (match[0].length === 0) {
            timestampRegex.lastIndex++;
          }
        }

        if (starts.length === 0) {
          return null;
        }

        let currentBlockIndex = -1;

        for (let i = 0; i < starts.length; i++) {
          const start = starts[i];
          const nextStart = (i + 1 < starts.length) ? starts[i + 1] : fullText.length;

          if (hit.index >= start && hit.index < nextStart) {
            currentBlockIndex = i;
            break;
          }
        }

        if (currentBlockIndex === -1) {
          return null;
        }

        const targetBlockIndex = currentBlockIndex + offset;

        if (targetBlockIndex < 0 || targetBlockIndex >= starts.length) {
          return null;
        }

        const start = starts[targetBlockIndex];
        let end = (targetBlockIndex + 1 < starts.length) ? starts[targetBlockIndex + 1] : fullText.length;

        while (end > start && /\s/.test(fullText.charAt(end - 1))) {
          end--;
        }

        const blockText = fullText.substring(start, end).trim();

        if (!blockText) {
          return null;
        }

        const filename = file.name.split('/').pop();

        return {
          query: window.lastSearchQuery || '',
          filename: filename,
          filePath: file.name,
          reportUrl: file.url,
          timestamp: extractTimestamp(blockText, fullText, start),
          hitNumberInFile: window.GIACurrentHitIndex + 1,
          hitCountInFile: window.GIAHitMatches.length,
          blockText: blockText,
          blockStart: start
        };
      }

      function isCurrentBlockSelected() {
        const selected = getCurrentSelectedBlock();

        if (!selected) {
          return false;
        }

        return isDuplicateSelection(selected);
      }

      function updateSelectButtonState() {
        if (window.GIAHitMatches.length === 0) {
          viewerSelectButtonEl.disabled = true;
          viewerSelectButtonEl.textContent = 'Select This Block';
          return;

        if (isCurrentBlockSelected()) {
          viewerSelectButtonEl.disabled = true;
          viewerSelectButtonEl.textContent = 'Already Selected';
        } else {
          viewerSelectButtonEl.disabled = false;
          viewerSelectButtonEl.textContent = 'Select This Block';
        }
      }

      function isDuplicateSelection(newItem) {
        for (let i = 0; i < window.GIASelectedResults.length; i++) {
          const item = window.GIASelectedResults[i];

      function downloadTextFile(filename, text) {
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 1000);
      }

      function saveSelections() {
        if (window.GIASelectedResults.length === 0) {
          return;
        }

        const nowObj = new Date();
        const nowIso = nowObj.toISOString().replace(/\.\d{3}Z$/, 'Z');

        function pad2(n) {
          return String(n).padStart(2, '0');
        }

        const nowStamp =
          nowObj.getUTCFullYear().toString() +
          pad2(nowObj.getUTCMonth() + 1) +
          pad2(nowObj.getUTCDate()) +
          '.' +
          pad2(nowObj.getUTCHours()) +
          pad2(nowObj.getUTCMinutes()) +
          pad2(nowObj.getUTCSeconds());

        const lines = [];
        const includeMetadata = includeMetadataCheckboxEl.checked;

        if (includeMetadata) {
        lines.push('Generated: ' + nowIso);
        lines.push('Search query: ' + (window.lastSearchQuery || ''));
        lines.push('Match/Case: ' + matchTypeEl.value + '/' + caseTypeEl.value);
        lines.push('Files searched: ' + window.GIASearchArchive.files.length);
        lines.push('Tool version: ' + TOOL_VERSION);
        /* lines.push('Max rows: ' + maxRowsEl.value); */
        /* lines.push('Total selections: ' + window.GIASelectedResults.length); */
        lines.push('');
        }

        const sortedSelections = window.GIASelectedResults.slice().sort(function (a, b) {
          const fileCompare = a.filename.localeCompare(b.filename);
          if (fileCompare !== 0) {
            return fileCompare;
          }

          return a.blockStart - b.blockStart;
        });

        for (let i = 0; i < sortedSelections.length; i++) {
          const item = sortedSelections[i];

          lines.push('============================================================');
          lines.push('File: ' + item.filename);
          lines.push(item.blockText);
          lines.push('');
        }

        const safeQuery = (window.lastSearchQuery || 'search')
          .replace(/[^A-Za-z0-9_-]+/g, '_')
          .replace(/^_+|_+$/g, '');

        const outName = 'GIA_Insight_' + (safeQuery || 'search') + '_' + nowStamp + '.txt';
        downloadTextFile(outName, lines.join('\n'));
      }

      function openViewer(file, payload) {
        if (typeof payload === 'string') {
          payload = {
            query: payload,
            matchType: matchTypeEl ? matchTypeEl.value : 'whole',
            caseSensitive: caseTypeEl ? (caseTypeEl.value === 'sensitive') : false
          };
        }

        const filename = file.name.split('/').pop();

        const matchType = payload.matchType || 'whole';
        const caseSensitive = !!payload.caseSensitive;
        const caseType = caseSensitive ? 'sensitive' : 'insensitive';

        window.GIACurrentOpenFile = file;
        viewerTitleEl.textContent = filename + '   ';

        const terms = [];
        const seen = new Set();

        if (payload.rows && Array.isArray(payload.rows)) {
          payload.rows.forEach(function (row) {
            const term = (row.term || '').trim();
            if (!term) return;

            const key = caseSensitive ? term : term.toLowerCase();
            if (seen.has(key)) return;

            seen.add(key);
            terms.push(term);
          });
        }

        if (terms.length === 0 && payload.query) {
          const term = String(payload.query).trim();
          if (term) {
            const key = caseSensitive ? term : term.toLowerCase();
            if (!seen.has(key)) {
              seen.add(key);
              terms.push(term);
            }
          }
        }

        if (terms.length === 0) {
          viewerBodyEl.textContent = file.text;
          window.GIAHitElements = [];
          window.GIAHitMatches = [];
          window.GIACurrentHitIndex = -1;
          viewerOverlayEl.style.display = 'block';
          viewerPrevHitButtonEl.disabled = true;
          viewerNextHitButtonEl.disabled = true;
          updateSelectButtonState();
          viewerPrevButtonEl.disabled = (window.GIACurrentResultIndex <= 0);
          viewerNextButtonEl.disabled = (window.GIACurrentResultIndex >= window.GIASearchResults.length - 1);
          return;
        }

        const escapedTerms = terms
          .slice()
          .sort(function (a, b) { return b.length - a.length; })
          .map(escapeRegex);

        let pattern;
        if (matchType === 'whole') {
          pattern = '\\b(?:' + escapedTerms.join('|') + ')\\b';
        } else {
          pattern = '(?:' + escapedTerms.join('|') + ')';
        }

        const flags = caseSensitive ? 'g' : 'gi';
        const regex = new RegExp(pattern, flags);

        let html = '';
        let lastIndex = 0;
        let match;
        let hitCount = 0;

        window.GIAHitMatches = [];

        while ((match = regex.exec(file.text)) !== null) {
          window.GIAHitMatches.push({
            index: match.index,
            text: match[0]
          });

          html += escapeHtml(file.text.substring(lastIndex, match.index));
          html += '<span class="viewerHit">' + escapeHtml(match[0]) + '</span>';
          lastIndex = match.index + match[0].length;
          hitCount++;

          if (match[0].length === 0) {
            regex.lastIndex++;
          }
        }

        html += escapeHtml(file.text.substring(lastIndex));

        if (hitCount > 0) {
          viewerBodyEl.innerHTML = html;
          window.GIAHitElements = Array.from(viewerBodyEl.querySelectorAll('.viewerHit'));
          window.GIACurrentHitIndex = 0;
        } else {
          viewerBodyEl.textContent = file.text;
          window.GIAHitElements = [];
          window.GIAHitMatches = [];
          window.GIACurrentHitIndex = -1;
        }

        viewerOverlayEl.style.display = 'block';

        if (window.GIAHitElements.length > 0) {
          updateCurrentHit();
        } else {
          viewerBodyEl.scrollTop = 0;
          viewerPrevHitButtonEl.disabled = true;
          viewerNextHitButtonEl.disabled = true;
        }

        updateSelectButtonState();
        viewerPrevButtonEl.disabled = (window.GIACurrentResultIndex <= 0);
        viewerNextButtonEl.disabled = (window.GIACurrentResultIndex >= window.GIASearchResults.length - 1);
      }

      function runSearch(query, options) {
        options = options || {};

        const matchType = options.matchType || matchTypeEl.value;
        const caseType = options.caseType || caseTypeEl.value;
        const sortOrder = options.sortOrder || sortOrderEl.value;
        const maxRows = options.maxRows || parseInt(maxRowsEl.value, 10);

        const fileMatchRegex = getSearchRegex(query, matchType, caseType, false);
        const countRegex = getSearchRegex(query, matchType, caseType, true);

        let totalMatches = 0;
        let matches = [];

        for (const file of window.GIASearchArchive.files) {
          if (fileMatchRegex.test(file.text)) {
            matches.push(file);
            totalMatches++;
          }
        }

        resultsEl.style.display = 'block';

        if (matches.length === 0) {
          resultsEl.textContent = 'No matches found.';
          window.GIASearchResults = [];
          clearButtonEl.style.display = 'none';
          selectionBarEl.classList.remove('ready');
          return;
        }

        matches.sort(function(a, b) {
          const aName = a.name.split('/').pop();
          const bName = b.name.split('/').pop();

          if (sortOrder === 'oldest') {
            if (a.year !== b.year) return a.year - b.year;
            return aName.localeCompare(bName);
          } else {
            if (a.year !== b.year) return b.year - a.year;
            return bName.localeCompare(aName);
          }
        });

        matches = matches.slice(0, maxRows);
        window.GIASearchResults = matches;

        let html = '<div>Found in ' + totalMatches + ' file(s)';

        if (totalMatches > matches.length) {
          html += ' (showing first ' + matches.length + ')';
        }

        html += ':</div>';
        html += '<table style="margin-top:0.5rem;border-collapse:collapse;">';
        html += '<tr><th style="text-align:center;padding-right:1rem;">Matches</th><th style="text-align:left;">Filename</th></tr>';

        for (let i = 0; i < matches.length; i++) {
          const file = matches[i];
          const filename = file.name.split('/').pop();
          const hits = file.text.match(countRegex);
          const count = hits ? hits.length : 0;

          html += '<tr>';
          html += '<td style="text-align:center;padding-right:1rem;">' + count + '</td>';
          html += '<td><a href="#" class="resultLink" data-result-index="' + i + '">' + filename + '</a></td>';
          html += '</tr>';
        }

        html += '</table>';
        resultsEl.innerHTML = html;

        const resultLinks = resultsEl.querySelectorAll('.resultLink');

        for (const link of resultLinks) {
          link.addEventListener('click', function (e) {
            e.preventDefault();

            const resultIndex = parseInt(this.getAttribute('data-result-index'), 10);
            const file = window.GIASearchResults[resultIndex];

            window.GIACurrentResultIndex = resultIndex;
            openViewer(file, query);
          });
        }

        clearButtonEl.style.display = 'inline-block';
      }

      function buildAdvancedPayload() {
        const termInputs = document.querySelectorAll('#advancedRows .term-input');
      
        const rows = [];
      
        function isOn(el) {
          if (!el) return false;
          if (el.type === 'checkbox') return !!el.checked;
          return el.classList.contains('active') ||
                 el.classList.contains('selected') ||
                 el.getAttribute('aria-pressed') === 'true' ||
                 el.getAttribute('data-active') === 'true';
        }
      
        function getRowOp(rowEl) {
          if (!rowEl) return 'AND';
      
          const opSelect = rowEl.querySelector('.op-select');
          if (opSelect && opSelect.value) {
            const op = opSelect.value.trim().toUpperCase();
            return (op === 'AND' || op === 'OR') ? op : 'AND';
          }
      
          const activeOpBtn = rowEl.querySelector(
            '.op-btn.active, .op-btn.selected, .op-btn[aria-pressed="true"], .op-btn[data-active="true"]'
          );
      
          if (activeOpBtn) {
            const op = (activeOpBtn.textContent || '').trim().toUpperCase();
            return (op === 'AND' || op === 'OR') ? op : 'AND';
          }
      
          return 'AND';
        }
      
        termInputs.forEach(function (termInput, index) {
          const rowEl =
            termInput.closest('.advanced-row, .advancedRow, .adv-row, .row') ||
            termInput.parentElement;
      
          const term = (termInput.value || '').trim();
          if (!term) return;
      
          const prevTermInput = index > 0 ? termInputs[index - 1] : null;
          const prevRowEl = prevTermInput
            ? (prevTermInput.closest('.advanced-row, .advancedRow, .adv-row, .row') || prevTermInput.parentElement)
            : null;
      
          const notCheckbox = rowEl ? rowEl.querySelector('.not-checkbox') : null;
          const notToggle = rowEl ? rowEl.querySelector('.not-toggle') : null;
          const groupStartCheckbox = rowEl ? rowEl.querySelector('.group-start') : null;
          const groupEndCheckbox = rowEl ? rowEl.querySelector('.group-end') : null;
      
          rows.push({
            term: term,
            op: index === 0 ? null : getRowOp(prevRowEl),
            not: isOn(notCheckbox) || isOn(notToggle),
            groupStart: isOn(groupStartCheckbox),
            groupEnd: isOn(groupEndCheckbox)
          });
        });
      
        return {
          caseSensitive: document.getElementById('caseSensitiveCheckbox')?.checked || false,
          maxResults: parseInt(document.getElementById('maxResultsInput')?.value || '100', 10),
          matchMode: document.getElementById('matchModeSelect')?.value || 'line',
          matchType: document.getElementById('matchTypeSelect')?.value || 'whole',
          rows: rows
        };
      }

      async function runAdvancedSearchServer(payload, options) {
        try {
          console.log("runAdvancedSearchServer payload =", payload);
          console.log("runAdvancedSearchServer options =", options);
      
          const res = await fetch("https://lance-exteriors-app.onrender.com/gia-search", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });
      
          const data = await res.json();
      
          console.log("RESULTS:", data);
      
          resultsEl.style.display = 'block';
      
          if (!data.results || data.results.length === 0) {
            resultsEl.textContent = 'No matches found.';
            window.GIASearchResults = [];
            clearButtonEl.style.display = 'none';
            selectionBarEl.classList.remove('ready');
            return;
          }
      
          const groupedByFile = {};
      
          for (const row of data.results) {
            if (!groupedByFile[row.file]) {
              const fullFile = window.GIASearchArchive.files.find(function(file) {
                return file.name === row.file;
              });
      
              groupedByFile[row.file] = {
                name: row.file,
                text: fullFile ? fullFile.text : '',
                year: fullFile ? fullFile.year : parseInt(row.file.match(/\b(\d{4})\b/)?.[1] || '0', 10),
                serverHits: []
              };
            }
      
            groupedByFile[row.file].serverHits.push({
              lineNumber: row.lineNumber,
              text: row.text
            });
          }
      
          let matches = Object.values(groupedByFile);
      
          matches.sort(function(a, b) {
            const aName = a.name.split('/').pop();
            const bName = b.name.split('/').pop();
      
            if (options.sortOrder === 'oldest') {
              if (a.year !== b.year) return a.year - b.year;
              return aName.localeCompare(bName);
            } else {
              if (a.year !== b.year) return b.year - a.year;
              return bName.localeCompare(aName);
            }
          });
      
          matches = matches.slice(0, payload.maxResults);
      
          window.GIASearchResults = matches;
      
          let html = '<div>Found in ' + matches.length + ' file(s)</div>';
          html += '<table style="margin-top:0.5rem;border-collapse:collapse;">';
          html += '<tr><th style="text-align:center;padding-right:1rem;">Matches</th><th style="text-align:left;">Filename</th></tr>';
      
          for (let i = 0; i < matches.length; i++) {
            const file = matches[i];
            const filename = file.name.split('/').pop();
            const count = file.serverHits.length;
      
            html += '<tr>';
            html += '<td style="text-align:center;padding-right:1rem;">' + count + '</td>';
            html += '<td><a href="#" class="resultLink" data-result-index="' + i + '">' + filename + '</a></td>';
            html += '</tr>';
          }
      
          html += '</table>';
          resultsEl.innerHTML = html;
      
          const resultLinks = resultsEl.querySelectorAll('.resultLink');
      
          for (const link of resultLinks) {
            link.addEventListener('click', function (e) {
              e.preventDefault();
      
              const resultIndex = parseInt(this.getAttribute('data-result-index'), 10);
              const file = window.GIASearchResults[resultIndex];
      
              window.GIACurrentResultIndex = resultIndex;
              openViewer(file, payload);
            });
          }
      
          clearButtonEl.style.display = 'inline-block';
        } catch (err) {
          console.error("runAdvancedSearchServer ERROR:", err);
          resultsEl.style.display = 'block';
          resultsEl.textContent = 'Search error. Check console.';
        }
      }

      async function loadSearchArchive() {
        try {
          statusEl.textContent = 'Fetching search.zip...';

          const response = await fetch(ZIP_URL, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('HTTP ' + response.status + ' while fetching ' + ZIP_URL);
          }

          statusEl.textContent = 'Reading zip into memory...';
          const zipBuffer = await response.arrayBuffer();

          statusEl.textContent = 'Inflating archive...';
          const zip = await JSZip.loadAsync(zipBuffer);

          const files = [];
          const entries = Object.keys(zip.files);

          for (const name of entries) {
            const entry = zip.files[name];
            if (entry.dir) {
              continue;
            }

            const rawText = await entry.async('string');
            const text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const year = parseInt(name.match(/\d{4}/)[0], 10);

            const htmlName = name
              .replace('_WSR.txt', '_GIA_Report.html')
              .replace('.txt', '_GIA_Report.html');

            const url = '/GIA-Reports/docs/' + htmlName;

            files.push({
              name: name,
              url: url,
              text: text,
              year: year
            });
          }

          window.GIASearchArchive.loaded = true;
          window.GIASearchArchive.files = files;

          statusEl.textContent = 'Archive loaded: ' + files.length + ' file(s) ready.';
          searchRowEl.classList.add('ready');
          updateSelectionCount();
          searchInputEl.focus();
        } catch (err) {
          console.error(err);
          statusEl.textContent = 'Failed to load search archive: ' + err.message;
        }
      }

      clearButtonEl.addEventListener('click', function () {
        searchInputEl.value = '';
        resultsEl.style.display = 'none';
        resultsEl.innerHTML = '';
        this.style.display = 'none';
        selectionBarEl.classList.remove('ready');
        searchInputEl.focus();
      });

//
// USE THIS FOR TESTING
//
      btnAdvancedSearchEl.addEventListener('click', function () {
        console.log('HELLO FROM btnAdvancedSearchEl.');
      
        const payload = buildAdvancedPayload();
      
        console.log('RETURNED FROM buildAdvancedPayload().');
        console.log('payload =', payload);
        console.log('payload.rows =', payload.rows);
        console.log('payload.rows.length =', payload.rows ? payload.rows.length : 'NO rows PROPERTY');
      
        if (!payload.rows || payload.rows.length === 0) {
          return;
        }
      
        console.log('IF YOU SEE THIS, BE HAPPY.');
      
        const pretty = JSON.stringify(payload, null, 2);
      
        console.log("SENDING JSON:\n" + pretty);
        console.log("COPY WITH:");
        console.log("copy(JSON.stringify(window.lastAdvancedPayload, null, 2))");
      
        window.lastAdvancedPayload = payload;
      
        runAdvancedSearchServer(payload, {
          sortOrder: advancedSortOrderEl.value
        });
      });

      btnAdvancedToggleEl.addEventListener('click', function () {
        if (
          advancedPanelEl.classList.contains('advanced-panel-hidden') ||
          (!advancedPanelEl.classList.contains('advanced-panel-open') &&
           !advancedPanelEl.classList.contains('advanced-panel-enter'))
        ) {
          openAdvancedPanel();
        } else {
          closeAdvancedPanel();
        }
      });

      btnAdvancedClearEl.addEventListener('click', function () {
        resetAdvancedRows();
      });

      btnAdvancedCloseEl.addEventListener('click', function () {
        closeAdvancedPanel();
      });

      function cycleTheme() {
        currentThemeIndex = (currentThemeIndex + 1) % searchThemes.length;
        applySearchTheme(searchThemes[currentThemeIndex].theme);
      }

      themeToggleButtonEl.addEventListener('click', cycleTheme);
      viewerThemeToggleButtonEl.addEventListener('click', cycleTheme);

      let currentThemeIndex = 0;
      applySearchTheme(searchThemes[currentThemeIndex].theme);

      function createAdvancedRow() {
        const row = $(`
          <div class="adv-row" style="margin-bottom:6px;">
            <button type="button" class="not-toggle">[ ] NOT</button>
            <button type="button" class="group-start">(</button>
            <input type="text" class="term-input" style="width:260px;">
            <button type="button" class="group-end">)</button>
            <button type="button" class="op-btn" data-op="AND" disabled>AND</button>
            <button type="button" class="op-btn" data-op="OR" disabled>OR</button>
          </div>
        `);
      
        row.data('not', false);
        row.data('groupStart', false);
        row.data('groupEnd', false);
        row.data('op', null);
      
        function setParenVisual($btn, isActive) {
          $btn.toggleClass('active', isActive);
          $btn.css({
            opacity: isActive ? '1' : '0.72',
            filter: isActive ? 'brightness(1.55)' : 'none',
            boxShadow: isActive ? 'inset 0 0 0 2px rgba(255,255,255,0.45)' : 'none',
            transform: isActive ? 'translateY(-1px)' : 'none'
          });
        }
      
        row.find('.term-input').on('input', function () {
          const hasText = $(this).val().trim() !== '';
          row.find('.op-btn').prop('disabled', !hasText);
        });
      
        row.find('.not-toggle').on('click', function () {
          const newVal = !row.data('not');
          row.data('not', newVal);
          $(this).toggleClass('active', newVal);
          $(this).text(newVal ? '[x] NOT' : '[ ] NOT');
        });
      
        row.find('.group-start').on('click', function () {
          const newVal = !row.data('groupStart');
          row.data('groupStart', newVal);
          setParenVisual($(this), newVal);
        });
      
        row.find('.group-end').on('click', function () {
          const newVal = !row.data('groupEnd');
          row.data('groupEnd', newVal);
          setParenVisual($(this), newVal);
        });
      
        row.find('.op-btn').on('click', function () {
          const op = $(this).data('op');
          row.data('op', op);
          row.find('.op-btn').removeClass('active');
          $(this).addClass('active');
      
          const rows = $('#advancedRows .adv-row');
          const isLast = row.is(rows.last());
      
          if (isLast) {
            $('#advancedRows').append(createAdvancedRow());
          }
        });
      
        return row;
      }

      function openAdvancedPanel() {
        advancedPanelEl.classList.remove('advanced-panel-hidden');
        advancedPanelEl.classList.add('advanced-panel-enter');

        requestAnimationFrame(function () {
          advancedPanelEl.classList.remove('advanced-panel-enter');
          advancedPanelEl.classList.add('advanced-panel-open');
        });

        setBasicSearchEnabled(false);
      }

      function closeAdvancedPanel() {
        advancedPanelEl.classList.remove('advanced-panel-open');
        advancedPanelEl.classList.add('advanced-panel-enter');

        setBasicSearchEnabled(true);

        setTimeout(function () {
          advancedPanelEl.classList.remove('advanced-panel-enter');
          advancedPanelEl.classList.add('advanced-panel-hidden');
        }, 180);
      }

      function resetAdvancedRows() {
        $('#advancedRows').empty().append(createAdvancedRow());
      }

      resetAdvancedRows();
      loadSearchArchive();

      function setBasicSearchEnabled(isEnabled) {
        searchInputEl.disabled = !isEnabled;
        findButtonEl.disabled = !isEnabled;
        matchTypeEl.disabled = !isEnabled;
        caseTypeEl.disabled = !isEnabled;
        sortOrderEl.disabled = !isEnabled;
        maxRowsEl.disabled = !isEnabled;
        btnAdvancedToggleEl.disabled = !isEnabled;
      }

      document.addEventListener('keydown', function (e) {
        if (viewerOverlayEl.style.display !== 'block') return;

        const tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

        if (!window.GIAHitElements || window.GIAHitElements.length === 0) return;

        if (e.key === 'ArrowLeft') {
          e.preventDefault();

          if (window.GIACurrentHitIndex <= 0) {
            window.GIACurrentHitIndex = window.GIAHitElements.length - 1;
          } else {
            window.GIACurrentHitIndex--;
          }

          updateCurrentHit();
        }

        if (e.key === 'ArrowRight') {
          e.preventDefault();

          if (window.GIACurrentHitIndex >= window.GIAHitElements.length - 1) {
            window.GIACurrentHitIndex = 0;
          } else {
            window.GIACurrentHitIndex++;
          }

          updateCurrentHit();
        }

      });

      window.runSearch = runSearch;

    })();
  </script>
</body>
